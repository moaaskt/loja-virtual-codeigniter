version: '3.8'

services:
  web:
    build: .
    container_name: loja_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: loja_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: loja_virtual
      MYSQL_USER: user_loja
      MYSQL_PASSWORD: password_loja
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
